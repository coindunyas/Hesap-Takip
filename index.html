<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />

  <title>Kişisel Hesap Takip Sistemi</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); transition: background .2s ease, color .2s ease; }
    :root {
      --bg: #f4f6f8; --text: #1f2937; --card: #ffffff; --muted: #6b7280; --tableHead: #111827; --tableHeadText: #ffffff; --border: #d1d5db; --line: #e5e7eb; --shadow: 0 4px 14px rgba(0,0,0,0.08); --tabBg: #ffffff; --tabText: #111827;
    }
    body.dark {

    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 32px; }
    h2 { font-size: 22px; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .section { margin-top: 24px; }
    .card, .form-box, table { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); }
    .card, .form-box { padding: 18px; }
    .card small { color: var(--muted); display: block; margin-bottom: 8px; }
    .value { font-size: 28px; font-weight: 700; }
    .positive { color: #15803d; }
    .negative { color: #b91c1c; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; }
    th, td { padding: 14px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
    th { background: var(--tableHead); color: var(--tableHeadText); }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }

    input, select, button, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--card); color: var(--text); }
    button { background: #111827; color: white; font-weight: 700; cursor: pointer; border: none; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    body.dark .btn-secondary { background: #334155; color: #e5e7eb; }
    .btn-danger { background: #b91c1c; color: white; }
    .btn-warning { background: #92400e; color: white; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .toolbar > * { width: auto; }
    .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .inline-actions button { width: auto; padding: 8px 10px; font-size: 12px; border-radius: 8px; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
    .tab-btn { width: auto; padding: 10px 14px; border-radius: 999px; background: var(--tabBg); color: var(--tabText); border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .tab-btn.active { background: #111827; color: white; border-color: #111827; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .login-overlay { position: fixed; inset: 0; background: rgba(17,24,39,0.85); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .login-card { width: min(420px, 92vw); background: var(--card); padding: 24px; border-radius: 20px; box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
    .hidden { display: none !important; }
    .info-box { background: #eff6ff; color: #1e3a8a; border-radius: 12px; padding: 12px 14px; margin-top: 10px; }
    body.dark .info-box { background: #172554; color: #dbeafe; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: center; justify-content: center; z-index: 60; }
    .modal.active { display: flex; }
    .modal-card { width: min(760px, 94vw); max-height: 85vh; overflow: auto; background: var(--card); color: va
</head>
<body>
  <div id="loginOverlay" class="login-overlay hidden">
    <div class="login-card">
      <h2>Giriş Koruması</h2>
      <p class="muted">İlk kullanımda şifre belirleyebilirsin. Sonraki açılışlarda aynı şifre istenir.</p>
      <div class="form-grid">
        <input type="password" id="loginPassword" placeholder="Şifre" />
      </div>
      <div class="toolbar">
        <button onclick="girisYap()">Giriş Yap</button>
        <button class="btn-secondary" onclick="sifresizDevamEt()">Şifresiz Devam Et</button>
        <button class="btn-warning" onclick="sifreOlusturVeyaGuncelle()">Şifre Oluştur / Değiştir</button>
      </div>
      <div class="info-box">Bu koruma tarayıcı içindedir. Güçlü güvenlik değil, pratik gizlilik sağlar.</div>
    </div>
  </div>

  <div class="container">
    <h1>Kişisel Hesap Takip Sistemi</h1>
    <p class="muted">Gelir, gider, cari, yatırım ve hesap bakiyelerini tek sayfada takip et.</p>

    <div class="toolbar">
      <button class="btn-secondary" onclick="temaDegistir()">Karanlık Mod</button>
      <button class="btn-secondary" onclick="verileriDisaAktar()">JSON Dışa Aktar</button>
      <button class="btn-secondary" onclick="csvDisariAkt).click()">JSON İçe Aktar</button>
      <input id="jsonIceriAl" type="file" accept="application/json" class="hidden" onchange="verileriIceriAl(event)" />
      <button class="btn-danger" onclick="tumVerileriSifirla()">Tüm Verileri Sıfırla</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="sekmeAc('genel', this)">Genel</button>
      <button class="tab-btn" onclick="sekmeAc('hareketler', this)">Gelir / Gider</button>
      <button class="tab-btn" onclick="sekmeAc('cari', this)">Cari</button>
      <button class="tab-btn" onclick="sekmeAc('yatirim', this)">Yatırım</button>
      <button class="tab-btn" onclick="sekmeAc('rapor', this)">Raporlar</button>
    </div>

    <div id="tab-genel" class="tab-panel active">
      <div class="section">
        <div class="grid" id="ozetKartlari"></div>
      </div>
      <div class="section">
        <h2>Hesaplar</h2>
        <table>
          <thead><tr><th>Hesap</th><th>Tip</th><th>Bakiye</th><th>İşlem</th></tr></thead>
          <tbody id="hesaplarTablo"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-hareketler" class="tab-panel">
      <div class="section">
        <div class="form-box">
          <h2>Taksitli Harcama</h2>
          <div class="form-grid">
            <input type="date" id="taksitTarih" />
            <input type="text" id="taksitKategori" placeholder="Kategori" />
            <input type="text" id="taksitAciklama" placeholder=" type="number" id="taksitToplam" placeholder="Toplam tutar" step="0.01" />
            <input type="number" id="taksitAdet" placeholder="Taksit sayısı" step="1" />
            <select id="taksitHesap"></select>
          </div>
          <div class="toolbar"><button onclick="taksitliHarcamaEkle()">Taksit Oluştur</button></div>
        </div>
      </div>
      <div class="section">
        <div class="form-box">
          <h2>Kredi Kartı Ödemesi / Transfer</h2>
          <div class="form-grid">
            <select id="transferKaynak"></select>
            <select id="transferHedef"></select>
            <input type="number" id="transferTutar" placeholder="Tutar" step="0.01" />
            <input type="date" id="transferTarih" />
          </div>
          <div class="toolbar"><button onclick="transferYap()">Transfer Yap</button></div>
        </div>
      </div>
      <div class="section two-col">
        <div class="form-box">
          <h2>Yeni Hareket Ekle</h2>
          <div class="form-grid">
            <input type="date" id="tarih" />
            <select id="tur"><option value="gelir">Gelir</option><option value="gider">Gider</option></select>
            <input type="text" id="kategori" placeholder="Kategori" />
            <input type="text" id="aciklama" placeholder="Açıklama (opsiyonel)" />
            <input type="number" id="tutar" placeholder="Tutar" step="0.01" />
            <select id="hesap"></select>
          </div>
          <div class="toolbar"><button onclick="hareketEkle()">Hareket Ekle</button></div>
        </div>

        <div class="form-box">
          <h2>Yeni Borç / Alacak Ekle</h2>
          <div class="form-grid">
            <input type="text" id="kisi" placeholder="Kişi / Kurum" />
            <select id="borcTip"><option value="borc">Borç</option><option value="alacak">Alacak</option></select>
            <input type="text" id="borcAciklama" placeholder="Açıklama (opsiyonel)" />
            <input type="number" id="borcTutar" placeholder="Tutar" step="0.01" />
            <input type="date" id="vade" />
            <select id="durum"><option value="Bekliyor">Bekliyor</option><option value="Ödenecek">Ödenecek</option><option value="Ödendi">Ödendi</option><option value="Tahsil Edildi">Tahsil Edildi</option></select>
          </div>
          <div class="toolbar"><button onclick="borcEkle()">Borç / Alacak Ekle</button></div>
        </div>
      </div>

      <div class="section">
        <h2>Hareketler</h2>
        <table>
          <thead><tr><th>Tarih</th><th>Tür</th><th>Kategori</th><th>Açıklama</th><th>Tutar</th><th>Hesap</th><th>İşlem</th></tr></thead>
          <tbody id="hareketlerTablo"></tbody>
        </table>
      </div>

      <div class="section">
        <h2>Borç / Alacak Listesi</h2>
        <table>
          <thead><tr><th>Kişi</th><th>Tip</th><th>Açıklama</th><th>Tutar</th><th>Vade</th><th>Durum</th><th>İşlem</th></tr></thead>
          <tbody id="borclarTablo"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-cari" class="tab-panel">
      <div class="section">
        <div class="form-box">
          <h2>Cari Takip</h2>
          <p class="muted">Aynı isimle eklenen cari kayıtlar otomatik birleşir.</p>
          <div class="form-grid">
            <input type="text" id="cariAd" placeholder="Cari adı" />
            <select id="cariIslemTipi"><option value="borclu">Borçlandır</option><option value="tahsilat">Tahsilat</option><option value="odeme">Ödeme</option><option value="alacaklandir">Alacaklandır</option></select>
            <input type="number" id="cariTutar" placeholder="Tutar" step="0.01" />
            <input type="text" id="cariAciklama" placeholder="Açıklama (opsiyonel)" />
            <input type="date" id="cariTarih" />
          </div>
          <div class="toolbar"><button onclick="cariHareketEkle()">Cari Hareket Ekle</button></div>
        </div>
      </div>

      <div class="section">
        <h2>Cari Listesi</h2>
        <table>
          <thead><tr><th>Cari</th><th>Bakiye</th><th>Son İşlem</th><th>İşlem</th></tr></thead>
          <tbody id="carilerTablo"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-yatirim" class="tab-panel">
      <div class="section">
        <div class="grid" id="yatirimOzetKartlari"></div>
      </div>
      <div class="section three-col">
        <div class="form-box">
          <h2>Yeni Hesap Ekle</h2>
          <div class="form-grid">
            <input type="text" id="yeniHesapAdi" placeholder="Hesap adı" />
            <select id="yeniHesapTipi"><option value="Nakit">Nakit</option><option value="Banka">Banka</option><option value="Kredi Kartı">Kredi Kartı</option><option value="Dijital Cüzdan">Dijital Cüzdan</option></select>
            <input type="number" id="yeniHesapBakiye" placeholder="Başlangıç bakiyesi" step="0.01" />
          </div>
          <div class="toolbar"><button onclick="hesapEkle()">Hesap Ekle</button></div>
        </div>

        <div class="form-box">
          <h2>Yatırım Takibi</h2>
          <div class="form-grid">
            <select id="yatirimVarlik"><option value="Altın">Altın</option><option value="Gümüş">Gümüş</option><option value="Dolar">Dolar</option><option value="Euro">Euro</option></select>
            <input type="number" id="yatirimMiktar" placeholder="Miktar" step="0.0001" />
            <input type="number" id="yatirimMaliyetFiyat" placeholder="Maliyet fiyatı" step="0.01" />
          </div>
          <div class="toolbar"><button onclick="yatirimEkle()">Yatırım Ekle</button></div>
        </div>

        <div class="form-box">
          <h2>Kur Yönetimi</h2>
          <p class="muted">Dolar / Euro için TCMB, altın / gümüş için manuel gram/TL gir.</p>
          <div class="toolbar">
            <button onclick="canliDovizGetir()">Canlı USD / EUR Çek</button>
            <button class="btn-secondary" onclick="kurGuncelle()">Tüm Kurları Manuel Güncelle</button>
          </div>
        </div>
      </div>

      <div class="section two-col">
        <div>
          <h2>Yatırım Listesi</h2>
          <table>
            <thead><tr><th>Varlık</th><th>Miktar</th><th>Maliyet</th><th>Güncel Fiyat</th><th>Güncel Tutar</th><th>Kâr / Zarar</th><th>İşlem</th></tr></thead>
            <tbody id="yatirimlarTablo"></tbody>
          </table>
        </div>
        <div>
          <h2>Kur Ekranı</h2>
          <table>
            <thead><tr><th>Varlık</th><th>Fiyat</th><th>Kaynak</th><th>İşlem</th></tr></thead>
            <tbody id="kurlarTablo"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-rapor" class="tab-panel">
      <div class="section two-col">
        <div class="form-box"><h2>Kategori Bazlı Gider Dağılımı</h2><canvas id="kategoriPastaGrafigi"></canvas></div>
        <div class="form-box"><h2>Aylık Rapor Filtresi</h2>
          <div class="form-grid">
            <input type="month" id="raporAy" />
            <button onclick="aylikRaporGuncelle()">Aylık Raporu Getir</buclass="info-box" id="aylikRaporKutusu">Bir ay seçip raporu görüntüleyebilirsin.</div>
        </div>
      </div>
      <div class="section">
        <div class="form-box">
          <h2>Aylık Rapor Filtresi</h2>
          <div class="form-grid">
            <input type="month" id="raporAy" />
            <button onclick="aylikRaporGuncelle()">Aylık Raporu Getir</button>
          </div>
          <div class="info-box" id="aylikRaporKutusu">Bir ay seçip raporu görüntüleyebilirsin.</div>
        </div>
      </div>
      <div class="section">
        <div class="grid" id="ozetKartlariRapor"></div>
      </div>
      <div class="section two-col">
        <div class="form-box"><h2>Varlık Dağılımı</h2><canvas id="yatirimDagilimGrafigi"></canvas></div>
        <div class="form-box"><h2>Nakit / Borç Özeti</h2><canvas id="finansOzetGrafigi"></canvas></div>
      </div>
      <div class="section">
        <div class="form-box"><h2>Yatırım Kâr / Zarar Grafiği</h2><canvas id="yatirimKarZararGrafigi"></canvas></div>
      </div>
      <div class="section">
        <h2>Yaklaşan Vadeler</h2>
        <table>
          <thead><tr><th>Tür</th><th>İsim</th><th>Tutar</th><th>Vade</th><th>Kalan Gün</th><th>Durum</th></tr></thead>
          <tbody id="hatirlatmalarTablo"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="cariModal" class="modal">
    <div class="modal-card">
      <div class="toolbar" style="justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">Cari Detay Geçmişi</h2>
        <button class="btn-secondary" onclick="cariModalKapat()">Kapat</button>
      </div>
      <div id="cariModalIcerik"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'hesapTakipV2';
    const PASSWORD

    function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
    function sayi(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
    function paraYazdir(tutar) { return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(sayi(tutar)); }

    let hareketler = [];
    let borclar = [];
    let hesaplar = [
      { id: uid(), hesap: 'Nakit', tip: 'Nakit', bakiye: 0 },
      { id: uid(), hesap: 'Banka', tip: 'Banka', bakiye: 0 },
      { id: uid(), hesap: 'Kredi Kartı', tip: 'Kredi Kartı', bakiye: 0 }
    ];
    let yatirimlar = []; // {id, varlik, miktar, maliyetFiyat}
    let kurlar = [
      { varlik: 'Altın', fiyat: 0, kaynak: 'Manuel (Gram/TL)' },
      { varlik: 'Gümüş', fiyat: 0, kaynak: 'Manuel (Gram/TL)' },
      { varlik: 'Dolar', fiyat: 0, kaynak: 'TCMB/Manuel' },
      { varlik: 'Euro', fiyat: 0, kaynak: 'TCMB/Manuel' }
    ];
    let cariler = [];
    let yatirimDagilimChart = null;
    let finansOzetChart = null;
    let yatirimKarZararChart = null;
    let kategoriPastaChart = null;

    function bugunStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function temaYukle() {
      const tema = localStorage.getItem('hesapTakipTema');
      if (tema === 'dark') document.body.classList.add('dark');
    }

    function temaDegistir() {
      document.body.classList.toggle('dark');
      localStorage.setItem('hesapTakipTema', document.body.classList.contains('dark') function varsayilanTarihleriDoldur() {
      const bugun = bugunStr();
      ['tarih', 'vade', 'cariTarih'].forEach(id => {
        const el = document.getElelue) el.value = bugun;
      });
    }

    function hesapSelectleriniGuncelle() {
      const el = document.getElementById('hesap');
      const kaynak = document.getElementById('transferKaynak');
      const hedef = document.getElementById('transferHedef');
      const options = hesaplar.map(h => `<option value="${h.hesap}">${h.hesap}</option>`).join('');
      if (el) el.innerHTML = options;
      if (kaynak) kaynak.innerHTML = options;
      if (hedef) hedef.innerHTML = options;
    }">${h.hesap}</option>`).join('');
    }

    function verileriKaydet() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ hareketler, borclar, hesaplar, yatirimlar, kurlar, cariler }));
    }

    function verileriYukle() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        hareketler = Array.isArray(data.hareketler) ? data.hareketler : [];
        borclar = Array.isArray(data.borclar) ? data.borclar : [];
        hesaplar = Array.isArray(data.hesaplar) && data.hesaplar.length ? data.hesaplar : hesaplar;
        yatirimlar = Array.isArray(data.yatirimlar) ? data.yatirimlar : [];
        kurlar = Array.isArray(data.kurlar) && data.kurlar.length ? data.kurlar : kurlar;
        cariler = Array.isArray(data.cariler) ? data.cariler : [];
      } catch (e) {
        console.error(e);
      }
    }

    function tumVerileriSifirla() {
      if (!confirm('Tüm kayıtlar silinsin mi?')) return;
      localStorage.removeItem(STORAGE_KEY);
      hareketler = [];
      borclar = [];
      hesaplar = [
        { id: uid(), hesap: 'Nakit', tip: 'Nakit', bakiye: 0 },
        { id: uid(), hesap: 'Banka', tip: 'Banka', bakiye: 0 },
        { id: uid(), hesap: 'Kredi Kartı', tip: 'Kredi Kartı', bakiye: 0 }
      ];
      yatirimlar = [];
      kurlar = [
        { varlik: 'Altın', fiyat: 0, kaynak: 'Manuel (Gram/TL)' },
        { varlik: 'Gümüş', fiyat: 0, kaynak: 'Manuel (Gram/TL)' },
        { varlik: 'Dolar', fiyat: 0, kaynak: 'TCMB/Manuel' },
        { varlik: 'Euro', fiyat: 0, kaynak: 'TCMB/Manuel' }
      ];
      cariler = [];
      guncelle();
    }

    function formTemizle() {
      ['kategori','aciklama','tutar','kisi','borcAciklama','borcTutar','yeniHesapAdi','yeniHesapBakiye','cariAd','cariTutar','cariAciklama','yatirimMiktar','yatirimMaliyetFiyat'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      varsayilanTarihleriDoldur();
    }

    function ozetHesapla() {
      const toplamGelir = hareketler.filter(x => x.tur === 'gelir').reduce((a, b) => a + sayi(b.tutar), 0);
      const toplamGider = Math.abs(hareketler.filter(x => x.tur === 'gider').reduce((auce((a, b) => a + sayi(b.tutar), 0);
      const toplamAlacak = borclar.filter(x => x.tip === 'alacak' && x.durum !== 'Tahsil Edildi').reduce((a, b) => a + sayi(b.tutar), 0);
      const toplamCariAlacak = cariler.filter(x => x.bakiye > 0).reduce((a, b) => a + sayi(b.bakiye), 0);
      const toplamCariBorc = Math.abs(cariler.filter(x => x.bakiye < 0).reduce((a, b) => a + sayi(b.bakiye), 0));

    async async function canliDovizGetir() {
      const proxyUrls = [
        'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://www.tcmb.gov.tr/kurlar/today.xml'),
        'https://cors.isomorphic-git.org/https://www.tcmb.gov.tr/kurlar/today.xml',
        'https://www.tcmb.gov.tr/kurlar/today.xml'
      ];

      let text = '';
      let lastError = null;
      for (const url of proxyUrls) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          text = await res.text();
          if (text && text.includes('CurrencyCode')) break;
        } catch (e) {
          lastError = e;
        }
      }

      if (!text) {
        console.error(lastError);
        alert('Canlı kur alınamadı. Dolar ve Euro için manuel giriş kullanabilirsin.');
        return;
      }

      try {
        const xml = new DOMParser().parseFromString(text, 'application/xml');
        const nodes = Array.from(xml.querySelectorAll('Currency'));
        const usd = nodes.find(x => x.getAttribute('CurrencyCode') === 'USD');
        const eur = nodes.find(x => x.getAttribute('CurrencyCode') === 'EUR');
        const usdTry = Number((usd?.querySelector('ForexSelling')?.textContent || usd?.querySelector('BanknoteSelling')?.textContent || '0').replace(',', '.'));
        const eurTry = Number((eur?.querySelector('ForexSelling')?.textContent || eur?.querySelector('BanknoteSelling')?.textContent || '0').replace(',', '.'));
        const usdKayit = kurlar.find(k => k.varlik === 'Dolar');
        const eurKayit = kurlar.find(k => k.varlik === 'Euro');
        if (usdKayit && usdTry) { usdKayit.fiyat = usdTry; usdKayit.kaynak = 'TCMB'; }
        if (eurKayit && eurTry) { eurKayit.fiyat = eurTry; eurKayit.kaynak = 'TCMB'; }
        guncelle();
        alert('USD ve EUR kurları güncellendi. Altın ve gümüş manuel gram/TL olarak kalır.');
      } catch (e) {
        console.error(e);
        alert('Kur verisi çözümlenemedi. Manuel giriş kullanabilirsin.');
      }
    }

    function girisYap() {
      const pass = document.getElementById('loginPassword').value;
      if (pass === localStorage.getItem(PASSWORD_KEY)) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('loginPassword').value = '';
      } else {
        alert('Şifre yanlış.');
      }
    }

    function sifresizDevamEt() { document.getElementById('loginOverlay').classList.add('hidden'); }

    function sifreOlusturVeyaGuncelle() {
      const yeni = prompt('Yeni şifre');
      if (!yeni) return;
      localStorage.setItem(PASSWORD_KEY, yeni);
      alert('Şifre kaydedildi.');
      document    }

    function aylikRaporGuncelle() {
      const secilenAy = document.getElementById('raporAy').value;
      const kutu = document.getElementById('aylikRaporKutusu');
      if (!secilenAy) {
        kutu.textContent = 'Lütfen bir ay seç.';
        return;
      }
      const [yil, ay] = secilenAy.split('-');
      const prefix = `${yil}-${ay}`;
      const aylikHareketler = hareketler.filter(x => (x.tarih || '').startsWith(prefix));
      const aylikBorclar = borclar.filter(x => (x.vade || '').startsWith(prefix));
      const gelir = aylikHareketler.filter(x => x.tur === 'gelir').reduce((a,b)=>a+sayi(b.tutar),0);
      const gider = Math.abs(aylikHarekider').reduce((a,b)=>a+sayi(b.tutar),0));
      const transfer = aylikHareketler.filter(x => x.tur === 'transfer').length;
      const borcToplam = aylikBorclar.filter(x => x.tip === 'borc').reduce((a,b)=>a+sayi(b.tutar),0);
      const alacakToplam = aylikBorclar.filter(x => x.tip === 'alacak').reduce((a,b)=>a+sayi(b.tutar),0);
      kutu.innerHTML = `Seçilen dönem: <strong>${ay}/${yil}</strong><br>Gelir: <strong>${paraYazdir(gelir)}</strong><br>Gider: <strong>${paraYazdir(gider)}</strong><br>Net: <strong>${paraYazdir(gelir-gider)}</strong><br>Transfer adedi: <strong>${transfer}</strong><br>Ay içi borç: <strong>${paraYazdir(borcToplam)}</strong><br>Ay içi alacak: <strong>${paraYazdir(alacakToplam)}</strong>`;
    }

    function hatirlatmalariGoster() {
      const bugun = new Date(bugunStr());
      const kayitlar = [];
      borclar.forEach(x => {
        if (!x.vade || x.durum === 'Ödendi' || x.durum === 'Tahsil Edildi') return;
        const vade = new Date(x.vade);
        const kalan = Math.ceil((vade - bugun) / (1000*60*60*24));
        kayitlar.push({ tur: x.tip === 'borc' ? 'Borç' : 'Alacak', isim: x.kisi, tutar: x.tutar, vade: x.vade, kalan, durum: x.durum });
      });
      kayitlar.sort((a,b)=>a.kalan-b.kalan);
      const hedef = document.getElementById('hatirlatmalarTablo');
      if (!hedef) return;
      hedef.innerHTML = kayitlar.length ? kayitlar.map(x => `
        <tr>
          <td>${x.tur}</td>
          <td>${x.isim}</td>
          <td>${paraYazdir(x.tutar)}</td>
          <td>${x.vade}</td>
          <td class="${x.kalan < 0 ? 'negative' : x.kalan <= 3 ? 'negative' : 'positive'}">${x.kalan}</td>
          <td>${x.durum}</td>
        </tr>
      `).join('') : '<tr><td colspan="6">Yaklaşan vade yok function sekmeAc(ad, btn) {
      document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      const panel = document.getElementById(`tab-${ad}`);
      if (panel) panel.classList.add('active');
      if (btn) btn.classList.add('active');
    }

    function taksitliHarcamaEkle() {
      const tarih = document.getElementById('taksitTarih').value || bugunStr();
      const kategori = document.getElementById('taksitKategori').value.trim();
      const aciklama = document.getElementById('taksitAciklama').value.trim();
      const toplam = sayi(document.getElementById('taksitToplam').value);
      const adet = Math.max(1, Math.floor(sayi(document.getElementById('taksitAdet').value)));
      const hesap = document.getElementById('taksitHesap').value;
      if (!kategori || !toplam || !adet || !hesap) return alert('Taksit bilgilerini doldur.');
      const aylik = Number((toplam / adet).toFixed(2));
      const baslangic = new Date(tarih);
      for (let i = 0; i < adet; i++) {
        const d = new Date(baslangic);
        d.setMonth(d.getMonth() + i);
        const t = d.toISOString().slice(0, 10);
        const sonTaksit = i === adet - 1;
        const tutar = sonTaksit ? -(Number((toplam - (aylik * (adet - 1))).toFixed(2))) : -aylik;
        hareketler.unshift({ id: uid(), tarih: t, tur: 'gider', kategori, aciklama: `${aciklama || 'Taksitli harcama'} (${i+1}/${adet})`, tutar, hesap, taksitGrup: `${tarih}-${kategori}-${toplam}-${adet}` });
      }
      const hesapKaydi = hesaplar.find(h => h.hesap === hesap);
      if (hesapKaydi) hesapKaydi.bakiye += -toplam;
      formTemizle();
      guncelle();
    }

    function transferYap() {
      const kaynak = document.getElementById('transferKaynak').value;
      const hedef = document.getElementById('transferHedef').value;
      const tutar = sayi(document.getElementById('transferTutar').value);
      const tarih = document.getElementById('transferTarih').value;
      if (!kaynak || !hedef || !tutar) return alert('Transfer bilgilerini doldur.');
      const k1 = hesaplar.find(h => h.hesap === kaynak);
      const k2 = hesaplar.find(h => h.hesap === hedef);
      if (!k1 || !k2) return;
      k1.bakiye -= tutar;
      k2.bakiye += tutar;
      hareketler.unshift({ id: uid(), tarih, tur: 'transfer', kategori: 'Transfer', aciklama: `${kaynak} → ${hedef}`, tutar: 0, hesap: hedef });
      guncelle();
    }

    function guncelle() {
      hesapSelectleriniGuncelle();
      ozetHesapla();
      hareketleriGoster();
      borclariGoster();
      hesaplariGoster();
      yatirimlariGoster();
      kurlariGoster();
      carileriGoster();
      grafikleriGuncelle();
      hatirlatmalariGoster();
      aylikRaporGuncelle();
      verileriKaydet();
    }

    temaYukle();
    verileriYukle();
    varsayilanTarihleriDoldur();
    const raporAyEl = document.getElementById('raporAy');
    if (raporAyEl && !raporAyEl.value) raporAyEl.value = bugunStr().slice(0,7);
    const transferTarihEl = document.getElementById('transferTarih');
    if (transferTarihEl && !transferTarihEl.value) transferTarihEl.value = bugunStr();
    const taksitTarihEl = document.getElementById('taksitTarih');
    if (taksitTarihEl && !taksitTarihEl.value) taksitTarihEl.value = bugunStr();
    const taksitHesapEl = document.getElementById('taksitHesap');
    if (taksitHesapEl) taksitHesapEl.innerHTML = hesaplar.map(h => `<option value="${h.hesap}">${h.hesap}</option>`).join('');
    guncelle();
    girisKorumasiniBaslat();
  </script>
</body>
